<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'none'; form-action 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RePass">
  <title>RePass</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>RePass</h1>
    <p class="tag">Practice remembering your secrets.</p>

    <ul id="list"></ul>

    <button type="button" id="add-btn" class="add-btn" aria-label="Add secret">+</button>

    <footer class="footer">
      <div class="data-actions">
        <button id="install" type="button" class="link" hidden>Install</button>
        <span class="sep" id="install-sep" hidden>·</span>
        <button id="export" type="button" class="link">Export</button>
        <span class="sep">·</span>
        <button id="import-btn" type="button" class="link">Import</button>
        <input type="file" id="import-file" accept=".json,application/json" hidden>
        <span class="sep">·</span>
        <button id="force-update" type="button" class="link">Update</button>
      </div>
      <div class="version" id="version"></div>
    </footer>
  </main>

  <dialog id="menu">
    <form method="dialog" id="edit-form">
      <div class="sheet-head">
        <button type="button" id="edit-cancel" class="link">Cancel</button>
        <h2 id="edit-title">Edit</h2>
        <button type="submit" class="link strong">Save</button>
      </div>
      <label>Name <input id="edit-name" type="text" required></label>
      <div id="delete-idle">
        <button type="button" id="edit-delete" class="ghost danger">Delete</button>
      </div>
      <div id="delete-confirming" hidden>
        <p class="confirm-text">Delete this secret?</p>
        <div class="row">
          <button type="button" id="delete-no" class="ghost">Cancel</button>
          <button type="button" id="delete-yes" class="ghost danger">Yes, delete</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog id="add-dialog">
    <form method="dialog" id="add-dialog-form">
      <div class="sheet-head">
        <button type="button" id="add-dialog-cancel" class="link">Cancel</button>
        <h2>Add secret</h2>
        <button type="submit" class="link strong">Add</button>
      </div>
      <label>Name <input id="dialog-name" type="text" required></label>
      <label>Secret
        <div class="pw">
          <input id="dialog-secret" type="password" required>
          <button type="button" class="eye" data-target="dialog-secret" aria-label="Show secret">Show</button>
        </div>
      </label>
    </form>
  </dialog>

  <dialog id="import-confirm">
    <form method="dialog" id="import-form">
      <div class="sheet-head">
        <button type="button" id="import-cancel" class="link">Cancel</button>
        <h2>Import</h2>
        <button type="submit" class="link strong">Replace</button>
      </div>
      <p class="confirm-text" id="import-text"></p>
    </form>
  </dialog>

  <dialog id="test">
    <form method="dialog" id="test-form">
      <div class="sheet-head">
        <button type="button" id="test-cancel" class="link">Cancel</button>
        <h2 id="test-title">Test</h2>
        <button type="submit" id="test-verify" class="link strong">Verify</button>
      </div>
      <div id="test-input-section">
        <label>Secret
          <div class="pw">
            <input id="test-input" type="password" autocomplete="off" required>
            <button type="button" class="eye" data-target="test-input" aria-label="Show secret">Show</button>
          </div>
        </label>
      </div>
      <div id="test-grade-section" hidden>
        <p class="confirm-text">How easy was it?</p>
        <div class="grade-row">
          <button type="button" class="grade" data-grade="1">Again</button>
          <button type="button" class="grade" data-grade="4">Good</button>
          <button type="button" class="grade" data-grade="5">Easy</button>
        </div>
      </div>
      <p id="test-msg" class="msg" hidden></p>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
