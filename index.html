<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111">
  <title>RePass</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>RePass</h1>
    <p class="tag">Practice remembering your secrets.</p>

    <form id="add-form" autocomplete="off">
      <input id="name" type="text" placeholder="Name" required>
      <input id="secret" type="password" placeholder="Secret" required>
      <select id="interval">
        <option value="1">Daily</option>
        <option value="7" selected>Weekly</option>
        <option value="14">Bi-weekly</option>
        <option value="30">Monthly</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <ul id="list"></ul>
  </main>

  <dialog id="menu">
    <form method="dialog" id="edit-form">
      <h2 id="edit-title">Edit</h2>
      <label>Name <input id="edit-name" type="text" required></label>
      <label>Cycle (days) <input id="edit-days" type="number" min="1" required></label>
      <div class="row">
        <button type="button" id="edit-cancel" class="ghost">Cancel</button>
        <button type="submit">Save</button>
      </div>
      <button type="button" id="edit-delete" class="ghost danger">Delete</button>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
