<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RePass">
  <title>RePass</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>RePass</h1>
    <p class="tag">Practice remembering your secrets.</p>

    <form id="add-form" autocomplete="off">
      <input id="name" type="text" placeholder="Name" required>
      <input id="secret" type="password" placeholder="Secret" required>
      <select id="interval">
        <option value="1">Daily</option>
        <option value="7" selected>Weekly</option>
        <option value="14">Bi-weekly</option>
        <option value="30">Monthly</option>
      </select>
      <button type="submit">Add</button>
    </form>

    <ul id="list"></ul>

    <footer class="version" id="version"></footer>
  </main>

  <dialog id="menu">
    <form method="dialog" id="edit-form">
      <div class="sheet-head">
        <button type="button" id="edit-cancel" class="link">Cancel</button>
        <h2 id="edit-title">Edit</h2>
        <button type="submit" class="link strong">Save</button>
      </div>
      <label>Name <input id="edit-name" type="text" required></label>
      <label>Cycle (days) <input id="edit-days" type="number" min="1" required></label>
      <div id="delete-idle">
        <button type="button" id="edit-delete" class="ghost danger">Delete</button>
      </div>
      <div id="delete-confirming" hidden>
        <p class="confirm-text">Delete this secret?</p>
        <div class="row">
          <button type="button" id="delete-no" class="ghost">Cancel</button>
          <button type="button" id="delete-yes" class="ghost danger">Yes, delete</button>
        </div>
      </div>
    </form>
  </dialog>

  <dialog id="test">
    <form method="dialog" id="test-form">
      <div class="sheet-head">
        <button type="button" id="test-cancel" class="link">Cancel</button>
        <h2 id="test-title">Test</h2>
        <button type="submit" class="link strong">Verify</button>
      </div>
      <label>Secret <input id="test-input" type="password" autocomplete="off" required></label>
      <p id="test-msg" class="msg" hidden></p>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
